name: Refresh leaderboard

on:
  schedule:
    - cron: "0 * * * *"   # hourly
  workflow_dispatch:       # manual trigger from UI
  push:
    branches: [main]
    paths: ["scripts/**", ".github/workflows/**"]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --no-audit --no-fund
      - run: npm run refresh

      - name: Commit changes
        run: |
          git config user.name "ringside-bot"
          git config user.email "ringside-bot@users.noreply.github.com"
          git add leaderboard.json snapshot.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "data: refresh $(date -u +%FT%TZ)"
            git push
          fi
